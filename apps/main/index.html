<!doctype html>
<html lang="en" class="h-full overflow-hidden dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IrisNotes</title>
    <!-- Critical CSS to prevent flash before Tailwind loads -->
    <style>
      html.dark { background-color: #111827; color: #f9fafb; }
      html:not(.dark) { background-color: #f9fafb; color: #111827; }
    </style>
    <!-- Prevent flash of wrong theme by reading stored theme name before React loads -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'default-dark';
        document.documentElement.setAttribute('data-theme', theme);
        // Dark themes: everything except the three light themes
        var lightThemes = ['default-light', 'catppuccin-latte', 'solarized-light'];
        var isDark = lightThemes.indexOf(theme) === -1;
        document.documentElement.classList.toggle('dark', isDark);
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      })();
    </script>
  </head>

  <body class="m-0 p-0 h-full overflow-hidden">
    <div id="root" class="overflow-hidden h-full flex flex-col"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
